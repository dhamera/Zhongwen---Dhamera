<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>记忆 · Memória Mandarim</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#241f18">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mandarim">
<style>
  :root{
    --ink:#241f18;
    --ink-soft:#6b6255;
    --ink-faint:#9a9184;
    --paper:#e7e1d2;
    --paper-raised:#f1ecdf;
    --card-face:#efe9da;
    --seal:#9c231e;
    --seal-dark:#711915;
    --jade:#4f6b5c;
    --jade-dark:#3a4f43;
    --brass:#9c7a2e;
    --line: rgba(36,31,24,0.16);
    --line-strong: rgba(36,31,24,0.30);
    --font-display: 'Songti SC','Noto Serif SC', Georgia, 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', 'Microsoft YaHei', sans-serif;
    --shadow: 0 1px 2px rgba(36,31,24,0.08), 0 8px 24px rgba(36,31,24,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    background:
      radial-gradient(ellipse at top left, rgba(156,35,30,0.05), transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(79,107,92,0.06), transparent 50%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:640px;margin:0 auto;padding:20px 18px 60px;min-height:100vh;position:relative;}

  /* ---------- header ---------- */
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand-glyph{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--seal);letter-spacing:1px;}
  .brand-text{display:flex;flex-direction:column;}
  .brand-text .t1{font-family:var(--font-display);font-size:15px;font-weight:600;letter-spacing:.3px;}
  .brand-text .t2{font-size:11px;color:var(--ink-soft);letter-spacing:.5px;}
  .streak{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brass);font-weight:600;white-space:nowrap;}
  .streak .n{font-family:var(--font-display);font-size:16px;}

  .fact-strip{
    display:flex;gap:8px;align-items:flex-start;font-size:11.5px;color:var(--ink-soft);
    line-height:1.5;margin-bottom:16px;
  }
  .fact-strip span{flex:1;}

  /* ---------- loading ---------- */
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--ink-soft);gap:14px;}
  .loading-glyph{font-family:var(--font-display);font-size:40px;color:var(--seal);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}

  /* ---------- stats row ---------- */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
  .stat{background:var(--paper-raised);border:1px solid var(--line);border-radius:4px;padding:10px 8px;text-align:center;}
  .stat .val{font-family:var(--font-display);font-size:20px;font-weight:700;}
  .stat .lab{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);margin-top:2px;}
  .stat.due .val{color:var(--seal);}
  .stat.new .val{color:var(--jade);}

  /* ---------- CTA ---------- */
  .cta-all{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    background:var(--ink);color:var(--paper-raised);border:none;border-radius:6px;
    padding:18px 20px;width:100%;cursor:pointer;margin-bottom:26px;
    font-family:var(--font-body);box-shadow:var(--shadow);
    transition:transform .15s ease;
  }
  .cta-all:active{transform:scale(0.98);}
  .cta-all:disabled{opacity:.45;cursor:default;}
  .cta-all .cta-left{text-align:left;}
  .cta-all .cta-title{font-size:15px;font-weight:600;}
  .cta-all .cta-sub{font-size:11.5px;color:#cfc6b3;margin-top:3px;}
  .cta-all .cta-arrow{font-size:20px;color:var(--seal);}

  /* ---------- deck list ---------- */
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);margin:0 0 10px 2px;}
  .deck-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
  .deck-row{
    display:flex;align-items:center;gap:12px;background:var(--paper-raised);
    border:1px solid var(--line);border-radius:5px;padding:12px 14px;
  }
  .deck-chop{
    width:34px;height:34px;flex:none;border-radius:3px;background:var(--seal);color:#f3ece0;
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
    font-size:14px;font-weight:700;transform:rotate(-4deg);box-shadow:0 1px 2px rgba(0,0,0,.25);
  }
  .deck-chop.chop-vida{background:var(--jade);}
  .deck-info{flex:1;min-width:0;}
  .deck-name{font-size:13.5px;font-weight:600;}
  .mastered-badge{
    display:inline-block;margin-left:7px;font-size:9.5px;font-weight:700;color:var(--jade-dark);
    background:rgba(79,107,92,.15);border-radius:10px;padding:2px 7px;letter-spacing:.3px;vertical-align:middle;
  }
  .deck-progress-bar{height:4px;border-radius:2px;background:var(--line);margin-top:6px;overflow:hidden;}
  .deck-progress-fill{height:100%;background:var(--jade);}
  .deck-counts{font-size:10.5px;color:var(--ink-soft);margin-top:4px;}
  .deck-go{
    flex:none;border:1px solid var(--line-strong);background:transparent;color:var(--ink);
    border-radius:4px;padding:7px 12px;font-size:11.5px;cursor:pointer;font-family:var(--font-body);
  }
  .deck-go:active{background:var(--ink);color:var(--paper-raised);}

  /* ---------- lessons: home entry card ---------- */
  .lessons-card{
    display:flex;align-items:center;justify-content:space-between;gap:14px;width:100%;
    background:linear-gradient(135deg, var(--brass), #7d6224);color:#fbf6e9;
    border:none;border-radius:6px;padding:16px 18px;cursor:pointer;margin-bottom:18px;
    font-family:var(--font-body);box-shadow:var(--shadow);text-align:left;
  }
  .lessons-card:active{transform:scale(.98);}
  .lessons-card-left{display:flex;align-items:center;gap:12px;}
  .lessons-card-chop{
    width:38px;height:38px;flex:none;border-radius:3px;background:rgba(0,0,0,.22);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
    font-size:17px;font-weight:700;
  }
  .lessons-card-title{font-size:14.5px;font-weight:700;}
  .lessons-card-sub{font-size:11px;color:#f3e6c4;margin-top:3px;line-height:1.4;}
  .lessons-card-arrow{font-size:20px;}

  /* ---------- lessons: list ---------- */
  .lessons-intro{margin-bottom:16px;}
  .lessons-intro-title{font-family:var(--font-display);font-size:19px;font-weight:700;margin-bottom:6px;}
  .lessons-intro-sub{font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
  .lesson-list{display:flex;flex-direction:column;gap:8px;}
  .lesson-row{
    display:flex;align-items:center;gap:12px;background:var(--paper-raised);
    border:1px solid var(--line);border-radius:5px;padding:12px 14px;cursor:pointer;
  }
  .lesson-row:active{background:var(--card-face);}
  .lesson-chop{
    width:34px;height:34px;flex:none;border-radius:3px;background:var(--brass);color:#fbf6e9;
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
    font-size:14px;font-weight:700;transform:rotate(-4deg);
  }
  .lesson-info{flex:1;min-width:0;}
  .lesson-title{font-size:13px;font-weight:600;line-height:1.3;}
  .lesson-hook{font-size:11px;color:var(--ink-soft);margin-top:4px;line-height:1.35;}
  .lesson-status{flex:none;color:var(--jade);font-weight:700;font-size:15px;width:18px;text-align:center;}

  /* ---------- lessons: reading view ---------- */
  .lesson-reading{max-width:560px;margin:0 auto;}
  .lesson-reading-chop{
    width:44px;height:44px;border-radius:4px;background:var(--brass);color:#fbf6e9;
    display:flex;align-items:center;justify-content:center;font-family:var(--font-display);
    font-size:19px;font-weight:700;margin-bottom:14px;transform:rotate(-3deg);
  }
  .lesson-reading-title{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1.3;margin-bottom:10px;}
  .lesson-reading-hook{font-size:13.5px;font-style:italic;color:var(--seal);line-height:1.5;margin-bottom:18px;}
  .lesson-reading-body p{font-family:var(--font-display);font-size:15px;line-height:1.75;color:var(--ink);margin-bottom:14px;}
  .lesson-fact-box{
    background:var(--paper-raised);border-left:3px solid var(--brass);border-radius:4px;
    padding:14px 16px;margin-top:20px;
  }
  .lesson-fact-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--brass);font-weight:700;margin-bottom:6px;}
  .lesson-fact-text{font-size:13px;line-height:1.55;color:var(--ink);}
  .lesson-nav{display:flex;gap:10px;max-width:560px;margin:26px auto 0;}
  .lesson-nav-btn{
    flex:1;padding:13px 10px;border-radius:5px;border:1px solid var(--line-strong);
    background:var(--paper-raised);color:var(--ink);font-family:var(--font-body);font-size:13px;
    font-weight:600;cursor:pointer;
  }
  .lesson-nav-btn:disabled{opacity:.4;cursor:default;}
  .lesson-nav-btn.primary{background:var(--ink);color:var(--paper-raised);border-color:var(--ink);}

  /* ---------- settings / footer ---------- */
  .footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:26px;padding-top:14px;border-top:1px solid var(--line);}
  .backup-row{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);}
  .backup-text{font-size:11px;color:var(--ink-soft);margin-bottom:10px;}
  .backup-buttons{display:flex;gap:8px;}
  .backup-btn{
    flex:1;border:1px solid var(--line-strong);background:var(--paper-raised);color:var(--ink);
    border-radius:5px;padding:9px 6px;font-size:11.5px;cursor:pointer;font-family:var(--font-body);
  }
  .backup-btn:active{background:var(--ink);color:var(--paper-raised);}
  .new-per-day{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
  .new-per-day input{width:44px;font-family:var(--font-body);font-size:12px;padding:3px 5px;border:1px solid var(--line-strong);border-radius:3px;background:var(--paper-raised);color:var(--ink);}
  .reset-link{font-size:11px;color:var(--ink-faint);background:none;border:none;text-decoration:underline;cursor:pointer;font-family:var(--font-body);}

  /* ---------- study screen ---------- */
  .study-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;}
  .back-btn{border:none;background:none;font-size:20px;color:var(--ink-soft);cursor:pointer;padding:4px 8px;}
  .study-progress-text{font-size:11.5px;color:var(--ink-soft);letter-spacing:.4px;}
  .study-deck-name{font-size:11.5px;color:var(--seal);font-weight:600;text-align:right;}

  .stage{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:56vh;}

  .tile-wrap{perspective:1400px;width:100%;max-width:340px;aspect-ratio:1/1.08;margin:0 auto;}
  .tile{
    position:relative;width:100%;height:100%;
    transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.3,1);
    cursor:pointer;
  }
  .tile.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;
    background:var(--card-face);border:1px solid var(--line-strong);border-radius:6px;
    box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;overflow:hidden;
  }
  .face-front{
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 50% 50%;
    background-position:center;
  }
  .face-front::before, .face-front::after{
    content:"";position:absolute;background:var(--line-strong);
  }
  .face-front::before{ /* vertical center dashed */
    left:50%;top:8%;bottom:8%;width:1px;
    background:repeating-linear-gradient(to bottom, var(--line-strong) 0 6px, transparent 6px 12px);
  }
  .face-front::after{ /* horizontal center dashed */
    top:50%;left:8%;right:8%;height:1px;
    background:repeating-linear-gradient(to right, var(--line-strong) 0 6px, transparent 6px 12px);
  }
  .hanzi{font-family:var(--font-display);font-weight:700;color:var(--ink);position:relative;z-index:2;line-height:1.25;text-align:center;padding:0 14px;}
  .tap-hint{position:absolute;bottom:14px;font-size:10px;letter-spacing:.6px;color:var(--ink-faint);text-transform:uppercase;}
  .chop-badge{
    position:absolute;top:12px;right:12px;background:var(--seal);color:#f3ece0;
    font-family:var(--font-display);font-size:10px;font-weight:700;padding:4px 7px;border-radius:3px;
    transform:rotate(6deg);box-shadow:0 1px 2px rgba(0,0,0,.3);letter-spacing:.4px;
  }
  .chop-badge.chop-badge-vida{background:var(--jade);}

  .face-back{transform:rotateY(180deg);justify-content:flex-start;padding-top:34px;text-align:center;gap:6px;}
  .back-pinyin{font-family:var(--font-display);font-size:22px;color:var(--seal);letter-spacing:.5px;}
  .back-hanzi-small{font-family:var(--font-display);font-size:26px;margin-top:2px;}
  .back-meaning{font-size:17px;font-weight:600;margin-top:14px;padding:0 10px;}
  .back-divider{width:40px;height:1px;background:var(--line-strong);margin:16px 0;}
  .back-example{font-size:13.5px;line-height:1.5;padding:0 14px;text-align:center;}
  .back-example .zh{font-size:15px;margin-bottom:4px;}
  .back-example .pt{color:var(--ink-soft);font-size:12.5px;}

  .sound-btn{
    border:1px solid var(--line-strong);background:var(--paper-raised);color:var(--ink);
    border-radius:20px;font-family:var(--font-body);cursor:pointer;
  }
  .sound-word{font-family:var(--font-display);font-size:15px;font-weight:600;padding:6px 14px;margin-bottom:2px;}
  .sound-sentence{font-size:10.5px;color:var(--ink-soft);padding:4px 10px;margin-top:10px;}
  .sound-btn:active{background:var(--seal);color:#f3ece0;border-color:var(--seal);}
  .sound-front{
    position:absolute;bottom:34px;font-size:15px;padding:6px 10px;border-radius:50%;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;z-index:3;
  }

  .rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:340px;margin-top:24px;}
  .rate-btn{
    display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 4px;border-radius:5px;border:1px solid var(--line-strong);
    background:var(--paper-raised);cursor:pointer;font-family:var(--font-body);color:var(--ink);
    transition:transform .1s ease;
  }
  .rate-btn:active{transform:scale(.95);}
  .rate-btn .lab{font-size:11.5px;font-weight:600;}
  .rate-btn .days{font-size:10px;color:var(--ink-soft);margin-top:1px;}
  .rate-btn.again{border-color:rgba(156,35,30,.4);}
  .rate-btn.again .lab{color:var(--seal);}
  .rate-btn.easy{border-color:rgba(79,107,92,.4);}
  .rate-btn.easy .lab{color:var(--jade);}

  .flip-cta{margin-top:22px;font-size:12px;color:var(--ink-soft);letter-spacing:.4px;text-align:center;}

  /* ---------- complete screen ---------- */
  .complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:58vh;text-align:center;gap:10px;}
  .complete-glyph{font-family:var(--font-display);font-size:52px;color:var(--seal);}
  .complete-title{font-size:18px;font-weight:700;margin-top:4px;}
  .complete-sub{font-size:13px;color:var(--ink-soft);max-width:280px;}
  .complete-stats{display:flex;gap:22px;margin:22px 0;}
  .complete-stats div{text-align:center;}
  .complete-stats .v{font-family:var(--font-display);font-size:22px;font-weight:700;}
  .complete-stats .l{font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;}
  .home-btn{background:var(--ink);color:var(--paper-raised);border:none;border-radius:5px;padding:12px 26px;font-size:13px;cursor:pointer;font-family:var(--font-body);}

  ::selection{background:rgba(156,35,30,.2);}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   DADOS: vocabulário extraído das aulas e do livro didático
   ============================================================ */
/* ============================================================
   FATO DO DIA: uma curiosidade diferente a cada dia, mesma fonte
   das lições — tudo já verificado, nada novo sem checagem.
   ============================================================ */
const FACTS = [
  'As inscrições em ossos oraculares (甲骨文) têm cerca de 3.250 anos — e o chinês é a única escrita antiga do mundo que nunca deixou de ser usada.',
  'O pinyin, criado por um comitê liderado por Zhou Youguang, só existe oficialmente desde 1958.',
  'Zhou Youguang, o "pai do pinyin", morreu em 2017, um dia depois de completar 111 anos.',
  'Mandarim tem cerca de 941 milhões de falantes nativos — mais que qualquer outra língua do planeta.',
  'Em 2004, só 53% da população da China falava mandarim. Hoje já passa de 80%.',
  '四 (quatro) soa como 死 (morte) — por isso muitos prédios chineses pulam o 4º andar.',
  '八 (oito) soa como 发 (prosperar) — as Olimpíadas de Pequim 2008 abriram propositalmente às 20h08 do dia 08/08.',
  'A reforma de 1956 simplificou 515 caracteres chineses, parte de uma campanha de alfabetização em massa.',
  'Antes da reforma de 1956, cerca de 80% dos adultos chineses eram analfabetos. Hoje a alfabetização passa de 95%.',
  'Existem cerca de 297 línguas vivas na China, além de dialetos do próprio chinês mutuamente incompreensíveis entre si quando falados.',
  '汉语 (Hànyǔ, "mandarim") significa literalmente "língua dos han" — referência à dinastia Han (206 a.C.–220 d.C.).',
  'Xangai, onde você mora, tem sua própria língua histórica: o xangainês (上海话), um dialeto wu diferente do mandarim.',
  'Confúcio viveu entre 551 e 479 a.C. — suas ideias sobre hierarquia e respeito aos mais velhos ainda moldam o dia a dia na China.',
  '面子 (miànzi, "face") e 关系 (guānxi, "relacionamentos") pesam tanto quanto qualquer contrato formal nos negócios chineses.',
  'A Rota da Seda, aberta durante a dinastia Han, conectou a China à Pérsia e a Roma — trocando seda, papel e pólvora.',
  'O almirante Zheng He liderou frotas de centenas de navios entre 1405 e 1433 — décadas antes de Colombo cruzar o Atlântico.',
  'O distrito de Pudong, em Xangai, era majoritariamente terreno agrícola até o início dos anos 1990.',
  'Desde 1978, o PIB da China saiu de cerca de US$ 150 bilhões para mais de US$ 18 trilhões.',
  'Entre 1978 e 2001, a pobreza extrema na China caiu de 41% para cerca de 5% da população — o maior programa de redução de pobreza da história.',
  'A China tem 56 grupos étnicos oficialmente reconhecidos — mandarim é só um fio da meada.'
];
function factOfDay(){
  const dayIndex = Math.floor(Date.now() / 86400000);
  return FACTS[dayIndex % FACTS.length];
}

/* ============================================================
   LIÇÕES: história do mandarim, história da China e cultura
   ============================================================ */
const LESSONS = [
{
  id:'l1', icon:'骨',
  title:'As raízes: uma língua com mais de 3.000 anos',
  hook:'Antes de existir o "chinês" que você estuda, já existia adivinhação com ossos de boi.',
  body:[
    'A escrita chinesa mais antiga que conhecemos é a escrita em ossos oraculares (甲骨文, jiǎgǔwén), usada há cerca de 3.250 anos, no fim da dinastia Shang. Sacerdotes gravavam perguntas em ossos de boi ou cascos de tartaruga, aqueciam até rachar, e liam o padrão das rachaduras como resposta dos ancestrais.',
    'Essas inscrições só foram reconhecidas por acaso, em 1899. Um estudioso chamado Wang Yirong contraiu malária e seu médico receitou "osso de dragão" — um remédio tradicional moído em pó. Antes de moer o osso que comprou, Wang notou símbolos estranhos gravados nele. Ele e um amigo, Liu E, perceberam que aquilo não era remédio: era escrita com milhares de anos.',
    'O chinês é o único sistema de escrita antigo do mundo que nunca parou de ser usado. Egípcio antigo, sumério e outras escritas morreram e precisaram ser decifradas por arqueólogos séculos depois. A escrita chinesa nunca foi "perdida" — ela só foi evoluindo, sem interrupção, até os caracteres que você estuda hoje.'
  ],
  fact:'Por séculos, ossos com escrita de 3 mil anos foram vendidos e literalmente engolidos como remédio — ninguém desconfiava que eram um tesouro histórico.'
},
{
  id:'l2', icon:'篆',
  title:'De pictogramas a caracteres: como a escrita evoluiu',
  hook:'Um imperador que unificou moedas, pesos e medidas também padronizou a escrita.',
  body:[

{

/* ============================================================
   ÁUDIO: pronúncia via voz nativa do navegador
   ============================================================ */
let ttsVoices = [];
let ttsAvailable = ('speechSynthesis' in window);
function loadVoices(){ if(ttsAvailable) ttsVoices = window.speechSynthesis.getVoices(); }
if(ttsAvailable){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function pickZhVoice(){
  if(!ttsVoices.length) return null;
  // 1) prioriza mandarim simplificado (zh-CN) especificamente — evita pegar
  //    por engano uma voz de Taiwan (zh-TW) ou Hong Kong/cantonês (zh-HK).
  const exact = ttsVoices.filter(v => v.lang && v.lang.toLowerCase() === 'zh-cn');
  const pool = exact.length ? exact : ttsVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('zh'));
  if(!pool.length) return null;
  // 2) dentro do que existe no aparelho, prefere a voz "Aprimorada/Premium"
  //    se o sistema expõe isso no nome — essas são bem mais claras que a
  //    voz "compacta" que vem instalada por padrão.
  const premium = pool.find(v => /premium|enhanced|neural|aprimorad/i.test(v.name));
  return premium || pool[0];
}
function speak(text){
  if(!ttsAvailable || !text) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    const v = pickZhVoice();
    if(v) u.voice = v;
    u.rate = 0.88;
    window.speechSynthesis.speak(u);
  }catch(e){ /* TTS indisponível neste navegador, segue sem som */ }
}

/* ============================================================
   ESTADO E PERSISTÊNCIA
   ============================================================ */
const STORAGE_KEY = 'srs-state-v1';
let state = null;
let currentQueue = [];
let currentIndex = 0;
let sessionReviewed = 0;
let sessionDeckFilter = null;
let currentLessonIndex = 0;

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, n){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function daysBetween(a,b){
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}

function defaultState(){
  return { cards:{}, meta:{ newPerDay:15, streak:0, lastStudyDate:null, totalReviews:0, lessonsRead:[] } };
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      const base = defaultState();
      // mescla com os padrões: se eu adicionar um campo novo no futuro,
      // o progresso salvo antigo não quebra, só ganha o valor padrão do campo novo.
      return {
        cards: parsed.cards || {},
        meta: Object.assign({}, base.meta, parsed.meta || {})
      };
    }
    return defaultState();
  }catch(e){
    return defaultState();
  }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ /* localStorage indisponível (modo privado?) ou cheio: segue sem salvar */ }
}

function getCardState(id){
  const base = { interval:null, ease:2.5, reps:0, due:null };
  if(!state.cards[id]) state.cards[id] = Object.assign({}, base);
  else state.cards[id] = Object.assign({}, base, state.cards[id]); // preenche campos novos que faltarem
  return state.cards[id];
}

function isDue(cs){
  if(cs.interval === null) return false; // é "novo", tratado à parte
  return cs.due <= todayStr();
}
function isNew(cs){ return cs.interval === null; }

/* Calcula os 4 prazos garantindo sempre Esqueci < Difícil < Bom < Fácil,
   mesmo em cartões novos (onde antes Difícil e Bom colidiam). */
function computeIntervals(cs){
  const again = 1;
  let good, hard, easy;
  if(cs.reps === 0){
    // primeira vez que este cartão recebe uma resposta positiva
    hard = 2; good = 3; easy = 5;
  } else if(cs.reps === 1){
    hard = 4; good = 6; easy = 9;
  } else {
    const prevInt = cs.interval || 6;
    good = Math.max(4, Math.round(prevInt * cs.ease));
    hard = Math.max(2, Math.min(good - 1, Math.round(good * 0.65)));
    easy = Math.max(good + 1, Math.round(good * 1.3));
  }
  return {again, hard, good, easy};
}
function previewIntervals(cs){ return computeIntervals(cs); }

function rateCard(cardId, rating){
  const cs = getCardState(cardId);
  const iv = computeIntervals(cs);
  if(rating === 0){ // Esqueci
    cs.reps = 0;
    cs.interval = iv.again;
    cs.ease = Math.max(1.3, cs.ease - 0.2);
    cs.due = todayStr(); // reaparece ainda nesta sessão / hoje
  } else if(rating === 1){ // Difícil
    cs.interval = iv.hard;
    cs.ease = Math.max(1.3, cs.ease - 0.15);
    cs.reps += 1;
    cs.due = addDays(todayStr(), cs.interval);
  } else if(rating === 2){ // Bom
    cs.interval = iv.good;
    cs.reps += 1;
    cs.due = addDays(todayStr(), cs.interval);
  } else { // Fácil
    cs.interval = iv.easy;
    cs.ease = cs.ease + 0.1;
    cs.reps += 1;
    cs.due = addDays(todayStr(), cs.interval);
  }
  state.meta.totalReviews += 1;
  updateStreak();
}

function updateStreak(){
  const t = todayStr();
  if(state.meta.lastStudyDate === t) return;
  if(state.meta.lastStudyDate === addDays(t,-1)){ state.meta.streak += 1; }
  else { state.meta.streak = 1; }
  state.meta.lastStudyDate = t;
}

/* ============================================================
   CONSTRUÇÃO DAS FILAS DE ESTUDO
   ============================================================ */
function buildQueue(deckId){
  const pool = deckId ? CARDS.filter(c=>c.deck===deckId) : CARDS;
  const due = [];
  const news = [];
  pool.forEach(c=>{
    const cs = getCardState(c.id);
    if(isNew(cs)) news.push(c);
    else if(isDue(cs)) due.push(c);
  });
  // embaralha os "due" para intercalar decks
  for(let i=due.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [due[i],due[j]]=[due[j],due[i]]; }
  const limit = state.meta.newPerDay;
  const newsToAdd = news.slice(0, Math.max(0, limit));
  return due.concat(newsToAdd);
}

function deckStats(deckId){
  const pool = CARDS.filter(c=>c.deck===deckId);
  let due=0, news=0, learned=0;
  pool.forEach(c=>{
    const cs = getCardState(c.id);
    if(isNew(cs)) news++;
    else { if(isDue(cs)) due++; if(cs.reps>=3) learned++; }
  });
  return {total:pool.length, due, news, learned};
}

function globalStats(){
  let due=0, news=0;
  CARDS.forEach(c=>{
    const cs = getCardState(c.id);
    if(isNew(cs)) news++;
    else if(isDue(cs)) due++;
  });
  return {due, news, total:CARDS.length, streak: state.meta.streak};
}

function renderLoading(){
  app.innerHTML = `
    <div class="loading-screen">
      <div class="loading-glyph">记</div>
      <div>Carregando seu progresso...</div>
    </div>`;
}

let view = 'home';

function renderHome(){
  const g = globalStats();
  function rowFor(d){
    const s = deckStats(d.id);
    const pct = s.total ? Math.round((s.learned/s.total)*100) : 0;
    const chopClass = d.tag === 'vida' ? 'deck-chop chop-vida' : 'deck-chop';
    const masteredBadge = (s.total > 0 && s.learned === s.total)
      ? '<span class="mastered-badge">✓ dominado</span>' : '';
    return `
      <div class="deck-row">
        <div class="${chopClass}">${d.chop}</div>
        <div class="deck-info">
          <div class="deck-name">${d.name}${masteredBadge}</div>
          <div class="deck-progress-bar"><div class="deck-progress-fill" style="width:${pct}%"></div></div>
          <div class="deck-counts">${s.total} cartões · ${s.due} para revisar · ${s.news} novos</div>
        </div>
        <button class="deck-go" data-deck="${d.id}">Estudar</button>
      </div>`;
  }
  const vidaRows = DECKS.filter(d=>d.tag==='vida').map(rowFor).join('');
  const aulasRows = DECKS.filter(d=>d.tag==='aulas').map(rowFor).join('');

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">
        <div class="brand-glyph">记</div>
        <div class="brand-text">
          <div class="t1">Memória Mandarim</div>
          <div class="t2">baseado nas suas aulas reais</div>
        </div>
      </div>
      <div class="streak">🔥 <span class="n">${g.streak}</span> dias</div>
    </div>

    <div class="fact-strip">💡 <span>${factOfDay()}</span></div>

    <button class="lessons-card" id="lessonsCardBtn">
      <div class="lessons-card-left">
        <div class="lessons-card-chop">史</div>
        <div class="lessons-card-text">
          <div class="lessons-card-title">História e Cultura</div>
          <div class="lessons-card-sub">${state.meta.lessonsRead.length} / ${LESSONS.length} lições · a origem do mandarim e da China, antes dos flashcards</div>
        </div>
      </div>
      <div class="lessons-card-arrow">→</div>
    </button>

    <div class="stats-row">
      <div class="stat"><div class="val">${g.total}</div><div class="lab">Total</div></div>
      <div class="stat due"><div class="val">${g.due}</div><div class="lab">Para revisar</div></div>
      <div class="stat new"><div class="val">${g.news}</div><div class="lab">Novos</div></div>
      <div class="stat"><div class="val">${state.meta.totalReviews}</div><div class="lab">Revisões totais</div></div>
    </div>

    <button class="cta-all" id="studyAllBtn" ${ (g.due+Math.min(g.news,state.meta.newPerDay))===0 ? 'disabled' : ''}>
      <div class="cta-left">
        <div class="cta-title">Revisar tudo agora</div>
        <div class="cta-sub">${g.due} pendentes + até ${Math.min(g.news,state.meta.newPerDay)} novos, misturados</div>
      </div>
      <div class="cta-arrow">→</div>
    </button>

    <div class="section-label">Vida real em Xangai · prioridade</div>
    <div class="deck-list">${vidaRows}</div>

    <div class="section-label">Das suas aulas</div>
    <div class="deck-list">${aulasRows}</div>

    <div class="backup-row">
      <div class="backup-text">Salve seu progresso num arquivo pra trocar de celular sem perder nada.</div>
      <div class="backup-buttons">
        <button class="backup-btn" id="exportBtn">⬇ Exportar backup</button>
        <button class="backup-btn" id="importBtn">⬆ Importar backup</button>
      </div>
      <input type="file" id="importFileInput" accept="application/json" style="display:none">
    </div>

    <div class="footer-row">
      <div class="new-per-day">
        Novos por dia <input type="number" id="newPerDayInput" min="0" max="50" value="${state.meta.newPerDay}">
      </div>
      <button class="reset-link" id="resetBtn">Reiniciar progresso</button>
    </div>
  `;

  document.getElementById('lessonsCardBtn').onclick = () => { view='lessons'; render(); };
  document.getElementById('studyAllBtn').onclick = () => startSession(null);
  document.querySelectorAll('.deck-go').forEach(btn=>{
    btn.onclick = () => startSession(btn.dataset.deck);
  });
  document.getElementById('newPerDayInput').onchange = (e) => {
    const v = Math.max(0, Math.min(50, parseInt(e.target.value)||0));
    state.meta.newPerDay = v;
    saveState();
    render();
  };
  document.getElementById('resetBtn').onclick = () => {
    if(confirm('Isso vai apagar todo o seu progresso de revisão (não as palavras). Tem certeza?')){
      state = defaultState();
      saveState();
      render();
    }
  };
  document.getElementById('exportBtn').onclick = exportBackup;
  document.getElementById('importBtn').onclick = () => document.getElementById('importFileInput').click();
  document.getElementById('importFileInput').onchange = (e) => {
    if(e.target.files && e.target.files[0]) importBackupFile(e.target.files[0]);
    e.target.value = ''; // permite reimportar o mesmo arquivo depois, se precisar
  };
}

function exportBackup(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mandarim-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackupFile(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    let parsed;
    try{
      parsed = JSON.parse(e.target.result);
    }catch(err){
      alert('Não consegui ler esse arquivo. Confirma que é um backup exportado por este app.');
      return;
    }
    if(!parsed || typeof parsed !== 'object' || !parsed.cards || !parsed.meta){
      alert('Esse arquivo não parece ser um backup deste app.');
      return;
    }
    if(!confirm('Isso vai substituir todo o progresso atual pelo do arquivo. Continuar?')) return;
    state = {
      cards: parsed.cards || {},
      meta: Object.assign({}, defaultState().meta, parsed.meta || {})
    };
    saveState();
    render();
    alert('Backup importado com sucesso!');
  };
  reader.onerror = () => alert('Não consegui abrir esse arquivo.');
  reader.readAsText(file);
}

function startSession(deckId){
  sessionDeckFilter = deckId;
  currentQueue = buildQueue(deckId);
  currentIndex = 0;
  sessionReviewed = 0;
  view = currentQueue.length ? 'study' : 'home';
  render();
}

function hanziFontSize(text){
  const len = (text || '').length;
  if(len <= 4) return 64;
  if(len <= 6) return 48;
  if(len <= 8) return 36;
  if(len <= 12) return 24;
  return 18;
}

function renderStudy(){
  if(currentIndex >= currentQueue.length){ view = 'complete'; render(); return; }
  const card = currentQueue[currentIndex];
  const cs = getCardState(card.id);
  const deckObj = DECKS.find(d=>d.id===card.deck);
  const deckName = deckObj.name;
  const chop = deckObj.chop;
  const chopBadgeClass = deckObj.tag === 'vida' ? 'chop-badge chop-badge-vida' : 'chop-badge';

  speak(card.hanzi); // toca assim que o cartão (a frente) aparece, antes mesmo de virar

  app.innerHTML = `
    <div class="study-topbar">
      <button class="back-btn" id="backBtn">←</button>
      <div class="study-progress-text">${currentIndex+1} / ${currentQueue.length}</div>
      <div class="study-deck-name">${deckName}</div>
    </div>
    <div class="stage">
      <div class="tile-wrap">
        <div class="tile" id="tile">
          <div class="face face-front">
            <div class="${chopBadgeClass}">${chop}</div>
            <div class="hanzi" style="font-size:${hanziFontSize(card.hanzi)}px">${card.hanzi}</div>
            <button class="sound-btn sound-front" id="soundFrontBtn" title="ouvir de novo">🔊</button>
            <div class="tap-hint">toque para virar</div>
          </div>
          <div class="face face-back">
            <button class="sound-btn sound-word" id="soundWordBtn" title="ouvir de novo">🔊 ${card.hanzi}</button>
            <div class="back-pinyin">${card.pinyin}</div>
            <div class="back-meaning">${card.pt}</div>
            <div class="back-divider"></div>
            <div class="back-example">
              <div class="zh">${card.ex}</div>
              <div class="pt">${card.expt}</div>
              <button class="sound-btn sound-sentence" id="soundSentBtn" title="ouvir a frase">🔊 ouvir frase</button>
            </div>
          </div>
        </div>
      </div>
      <div id="afterFlip" style="width:100%;display:flex;flex-direction:column;align-items:center;"></div>
    </div>
  `;

  const tile = document.getElementById('tile');
  const afterFlip = document.getElementById('afterFlip');
  let flipped = false;

  function showRateButtons(){
    const p = previewIntervals(cs);
    afterFlip.innerHTML = `
      <div class="rate-row">
        <button class="rate-btn again" data-r="0"><span class="lab">Esqueci</span><span class="days">${p.again}d</span></button>
        <button class="rate-btn" data-r="1"><span class="lab">Difícil</span><span class="days">${p.hard}d</span></button>
        <button class="rate-btn" data-r="2"><span class="lab">Bom</span><span class="days">${p.good}d</span></button>
        <button class="rate-btn easy" data-r="3"><span class="lab">Fácil</span><span class="days">${p.easy}d</span></button>
      </div>`;
    afterFlip.querySelectorAll('.rate-btn').forEach(btn=>{
      btn.onclick = (ev) => {
        ev.stopPropagation();
        const r = parseInt(btn.dataset.r);
        rateCard(card.id, r);
        saveState();
        sessionReviewed++;
        if(r===0){
          // Esqueci: manda pro fim da fila de hoje para reforçar
          currentQueue.push(card);
        }
        currentIndex++;
        view='study';
        render();
      };
    });
  }

  function doFlip(){
    if(flipped) return;
    flipped = true;
    tile.classList.add('flipped');
    setTimeout(() => {
      showRateButtons();
      speak(card.hanzi); // toca o áudio automaticamente ao virar
      const wb = document.getElementById('soundWordBtn');
      const sb = document.getElementById('soundSentBtn');
      if(wb) wb.onclick = (ev) => { ev.stopPropagation(); speak(card.hanzi); };
      if(sb) sb.onclick = (ev) => { ev.stopPropagation(); speak(card.ex); };
    }, 400);
  }

  tile.onclick = doFlip;
  afterFlip.innerHTML = `<div class="flip-cta">Toque no cartão para ver o significado</div>`;
  const fb = document.getElementById('soundFrontBtn');
  if(fb) fb.onclick = (ev) => { ev.stopPropagation(); speak(card.hanzi); };

  document.getElementById('backBtn').onclick = () => { view='home'; render(); };
}

function renderComplete(){
  app.innerHTML = `
    <div class="complete-screen">
      <div class="complete-glyph">好</div>
      <div class="complete-title">Sessão concluída</div>
      <div class="complete-sub">Você revisou ${sessionReviewed} cartão${sessionReviewed===1?'':'s'}${sessionDeckFilter ? ' neste tema' : ''}. O progresso já foi salvo.</div>
      <div class="complete-stats">
        <div><div class="v">${state.meta.streak}</div><div class="l">Sequência</div></div>
        <div><div class="v">${state.meta.totalReviews}</div><div class="l">Total geral</div></div>
      </div>
      <button class="home-btn" id="homeBtn">Voltar ao início</button>
    </div>`;
  document.getElementById('homeBtn').onclick = () => { view='home'; render(); };
}

function renderLessonsList(){
  const rows = LESSONS.map((l, idx) => {
    const read = state.meta.lessonsRead.includes(l.id);
    return `
      <div class="lesson-row" data-idx="${idx}">
        <div class="lesson-chop">${l.icon}</div>
        <div class="lesson-info">
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-hook">${l.hook}</div>
        </div>
        <div class="lesson-status">${read ? '✓' : ''}</div>
      </div>`;
  }).join('');

  const readCount = state.meta.lessonsRead.length;

  app.innerHTML = `
    <div class="study-topbar">
      <button class="back-btn" id="backBtn">←</button>
      <div class="study-progress-text">${readCount} / ${LESSONS.length} lidas</div>
      <div style="width:20px"></div>
    </div>
    <div class="lessons-intro">
      <div class="lessons-intro-title">História e Cultura</div>
      <div class="lessons-intro-sub">10 lições curtas sobre a origem do mandarim, a história da China e o que todo estrangeiro deveria saber — pra entender a língua, não só decorar ela.</div>
    </div>
    <div class="lesson-list">${rows}</div>
  `;

  document.getElementById('backBtn').onclick = () => { view='home'; render(); };
  document.querySelectorAll('.lesson-row').forEach(row => {
    row.onclick = () => {
      currentLessonIndex = parseInt(row.dataset.idx);
      view = 'lesson';
      render();
    };
  });
}

function renderLesson(){
  const l = LESSONS[currentLessonIndex];
  if(!state.meta.lessonsRead.includes(l.id)){
    state.meta.lessonsRead.push(l.id);
    saveState();
  }
  const bodyHtml = l.body.map(p => `<p>${p}</p>`).join('');
  const isFirst = currentLessonIndex === 0;
  const isLast = currentLessonIndex === LESSONS.length - 1;

  app.innerHTML = `
    <div class="study-topbar">
      <button class="back-btn" id="backToListBtn">←</button>
      <div class="study-progress-text">Lição ${currentLessonIndex+1} / ${LESSONS.length}</div>
      <div style="width:20px"></div>
    </div>
    <div class="lesson-reading">
      <div class="lesson-reading-chop">${l.icon}</div>
      <div class="lesson-reading-title">${l.title}</div>
      <div class="lesson-reading-hook">${l.hook}</div>
      <div class="lesson-reading-body">${bodyHtml}</div>
      <div class="lesson-fact-box">
        <div class="lesson-fact-label">Curiosidade</div>
        <div class="lesson-fact-text">${l.fact}</div>
      </div>
    </div>
    <div class="lesson-nav">
      <button class="lesson-nav-btn" id="prevLessonBtn" ${isFirst ? 'disabled' : ''}>← Anterior</button>
      <button class="lesson-nav-btn primary" id="nextLessonBtn">${isLast ? 'Concluir' : 'Próxima →'}</button>
    </div>
  `;

  document.getElementById('backToListBtn').onclick = () => { view='lessons'; render(); };
  document.getElementById('prevLessonBtn').onclick = () => {
    if(!isFirst){ currentLessonIndex--; view='lesson'; render(); }
  };
  document.getElementById('nextLessonBtn').onclick = () => {
    if(isLast){ view='lessons'; render(); }
    else { currentLessonIndex++; view='lesson'; render(); }
  };
}

/* ============================================================
   INICIALIZAÇÃO
   ============================================================ */
(function init(){
  renderLoading();
  state = loadState();
  view = 'home';
  render();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline opcional, segue sem cache */ });
  });
}
</script>
